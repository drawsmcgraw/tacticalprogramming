<header class="shell">
  <div class="masthead">
    <div class="masthead-top">
      <div class="l">
        <span class="date">{{ now.Format "2006-01-02" }}</span>
      </div>
      <div class="r">
        <a href="/">Tactical Programming</a>
      </div>
    </div>
    <div class="masthead-main">
      <div class="slogan-l">Editorial Design</div>
      <h1 class="logo">
        <a href="/">Tactical<span class="slash">/</span>Programming</a>
      </h1>
      <div class="slogan-r">Cloud Native Thoughts</div>
    </div>
    <div class="nav-strip">
      <nav class="sections">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </nav>
      <div class="utility">
        <button class="theme-toggle" aria-label="Toggle theme">
          <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </div>
</header>
